<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<h1>Edit Product</h1>
<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<h1>Edit Employee</h1>

<form th:action="@{/updateEmployee}" th:object="${employeeEdit}" method="post">
    <!-- Отображение общих ошибок -->
    <div th:if="${errors != null}">
        <div class="alert alert-danger">
            <ul>
                <li th:each="error : ${errors}" th:text="${error.defaultMessage}"></li>
            </ul>
        </div>
    </div>

    <!-- Скрытое поле ID -->
    <input type="hidden" th:field="*{id}"/>

    <!-- Поле логина с валидацией -->
    <div class="form-group" th:classappend="${#fields.hasErrors('login') ? 'is-invalid' : ''}">
        <label>Login:</label>
        <input type="text" th:field="*{login}" class="form-control">
        <div th:if="${#fields.hasErrors('login')}"
             th:errors="*{login}"
             class="invalid-feedback"></div>
    </div>

    <!-- Выбор ролей -->
    <div class="form-group" th:classappend="${#fields.hasErrors('roleIds') ? 'is-invalid' : ''}">
        <label>Roles:</label>
        <small>Hold Ctrl to choose several roles.</small><br/><br/>

        <select name="roleIds" multiple required size="5" style="width: 300px;"
                th:field="*{roleIds}">
            <option th:each="role : ${employeeWithRoles.roleDTOS}"
                    th:value="${role.id}"
                    th:text="${role.name}"></option>
        </select>

        </div>
    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
    <a th:href="@{/getEmployeePage}" class="btn btn-secondary">Отмена</a>
</form>
</html>
