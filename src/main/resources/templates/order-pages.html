<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee List</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
</head>

<h1>Order List</h1>

<div th:if="${validationError != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${validationError}">Error</span>
</div>
<div th:if="${searchError != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${searchError}">Error</span>
</div>

<div th:if="${missingAttributeError != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${missingAttributeError}">Error</span>
</div>
<div th:if="${errorPage != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${errorPage}">Error</span>
</div>

<body>
<table border="1">

    <tr>
        <th>Id</th>
        <th>Payment Data</th>
        <th>Total Cost</th>
        <th>IsBought</th>
    </tr>


    <tr th:each="order : ${orderPage.getContent}">
        <td th:utext="${order.id}">...</td>
        <td th:utext="${order.paymentData}">...</td>
        <td th:utext="${order.totalCost}">...</td>
        <td th:utext="${order.isBought}">...</td>

    </tr>

    <br>
    <br>
    <br>

    <form th:action="@{/findOrderById}"
          method="get">
        Identifier:
        <input type="text" name="id"/>
        <br/>
        <input type="submit" value="Find Order"/>
    </form>

    <br>
    <br>
    <br>



</table>

<div>
    <span th:if="${orderPage.hasPrevious()}">
        <a th:href="@{/getOrderPage(offset=${orderPage.number - 1},size=${orderPage.size})}">Back</a>
    </span>
    <th:block th:each="counter : ${#numbers.sequence(0,orderPage.totalPages - 1)}">
        <span th:if="${orderPage.number == counter} ">[[${counter} + 1]] </span>
        <span th:unless="${orderPage.number == counter}">
        <a th:href="@{/getOrderPage(offset=${counter},size=${orderPage.size})}">[[${counter} + 1]] </a>
        </span>
    </th:block>
    <span th:if="${orderPage.hasNext()}">
        <a th:href="@{/getOrderPage(offset=${orderPage.number + 1},size = ${orderPage.size})}">Forward</a>
    </span>


</div>
<form th:action="@{/addNewOrder}" method="post">
    <button type="submit">Create order</button>
</form>

<a th:href="@{/manager}"> To Manager menu </a>
<br>
<br>
<a th:href="@{/admin}"> To Admin menu </a>
<br>
<br>
<a th:href="@{/cashier}"> To Cashier menu </a>

</body>

</html>
