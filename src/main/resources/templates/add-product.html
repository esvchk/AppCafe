<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register New Employee</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
</head>
<body>

<h1>Registration Form</h1>

<!-- Блок ошибки -->
<div th:if="${errorMessage}" style="background-color: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <p th:text="${errorMessage}"></p>
</div>

<!-- Форма -->
<form th:action="@{/addProduct}" th:object="${newProduct}" method="post">

    <!-- Поле Name -->
    Name:
    <input type="text" th:field="*{name}" required/>
    <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback" th:errors="*{name}"></div>
    <br/>

    <!-- Поле Price -->
    Price:
    <input type="number" step="0.01" th:field="*{price}" required/>
    <div th:if="${#fields.hasErrors('price')}" class="invalid-feedback" th:errors="*{price}"></div>
    <br/>

    <!-- Поле Info -->
    Info:
    <input type="text" th:field="*{info}"/>
    <div th:if="${#fields.hasErrors('info')}" class="invalid-feedback" th:errors="*{info}"></div>
    <br/>

    <!-- Поле IsAvailable -->
    IsAvailable:
    <input type="radio" value="true" th:field="*{isAvailable}" required/> Yes
    <input type="radio" value="false" th:field="*{isAvailable}" required/> No
    <br/><br/>

    <!-- Поле Limit -->
    Limit:
    <input type="number" th:field="*{productLimit}"/>
    <div th:if="${#fields.hasErrors('productLimit')}" class="invalid-feedback" th:errors="*{productLimit}"></div>
    <br/>

    <!-- Общий список ошибок валидации -->
    <div th:if="${#fields.hasAnyErrors()}">
        <div class="alert alert-danger">
            <ul>
                <li th:each="error : ${#fields.allErrors()}" th:text="${error}"></li>
            </ul>
        </div>
    </div>

    <input type="submit" value="Add product"/>
</form>

<a th:href="@{/manager}"> Home </a>

</body>
</html>
