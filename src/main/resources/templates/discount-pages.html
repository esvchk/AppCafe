<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee List</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
</head>

<h1>Employee List</h1>

<body>
<table border="1">

    <tr>
        <th>Id</th>
        <th>Percent Of Discount</th>
        <th>Name</th>
        <th>IsActive</th>
    </tr>


    <tr th:each="discount : ${discountPage.getContent}">
        <td th:utext="${discount.id}">...</td>
        <td th:utext="${discount.percentOfDiscount}">...</td>
        <td th:utext="${discount.name}">...</td>
        <td th:utext="${discount.isActive}">...</td>
        <!--        <td>-->
        <!--            <a th:href="@{/deleteProduct(id=${employee.id})}">Delete </a>-->
        <!--            <a th:href="@{/editProduct(id=${prod.id})}">Edit </a>-->
        <!--            <a th:href="@{/editLimit(id=${product.id})}">Set Limit </a>-->
        <!--        </td>-->
    </tr>


        <form th:action="@{/addDiscount}"
              th:object="${discount}" method="post">
            Name:
            <input type="text" th:field="*{name}"/>
            <br/>
            Percent Of Discount:
            <input type="number" th:field="*{percentOfDiscount}"/>
            <br/>
            IsActive:
            <input type="radio"  value="true" th:field="*{isActive}" required> Yes
            <input type="radio" value="false" th:field="*{isActive}" required> No<br>
            <br/>
            <input type="submit" value="Add product"/>
        </form>


    <br>
    <br>
    <br>

    <form th:action="@{/findById}"
          method="get">
        Identifier:
        <input type="text" name="id"/>
        <br/>
        <input type="submit" value="Find Product"/>
    </form>

    <br>
    <br>
    <br>

    <form th:action="@{/findByName}"
          method="get">
        Name:
        <input type="text" name="name"/>
        <br/>
        <input type="submit" value="Find Product"/>
    </form>

    <br>
    <br>
    <br>


</table>

<div>
    <span th:if="${discountPage.hasPrevious()}">
        <a th:href="@{/getDiscountPage(page=${discountPage.number - 1},size=${discountPage.size})}">Back</a>
    </span>
    <th:block th:each="counter : ${#numbers.sequence(0,discountPage.totalPages - 1)}">
        <span th:if="${discountPage.number == counter} ">[[${counter} + 1]] </span>
        <span th:unless="${discountPage.number == counter}">
        <a th:href="@{/getDiscountPage(page=${counter},size=${discountPage.size})}">[[${counter} + 1]] </a>
        </span>
    </th:block>
    <span th:if="${discountPage.hasNext()}">
        <a th:href="@{/getDiscountPage(page=${discountPage.number + 1},size = ${discountPage.size})}">Forward</a>
    </span>


</div>


</body>

</html>
