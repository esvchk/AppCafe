<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
</head>

<h1>Registration</h1>

    <form th:action="@{/registerEmployee}"
          th:object="${employeeRequest}" method="post">
        Name:
        <input type="text" th:field="*{login}"/>
        <br/>
        Password:
        <input type="text" th:field="*{password}"/>
        <br/>
        Role:
        <div>
            <label>
                <select th:field="*{roleNames}" multiple size="4">
                    <option th:each="role : ${availableRoles}"
                            th:value="${role.name}"
                            th:text="${role.name}">
                    </option>
                </select>
            </label>
        </div>

        <input type="submit" value="Add Employee"/>
    </form>
<a th:href="@{/manager}"> Home </a>
</html>
