<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
</head>
<h1>Results</h1>
<body>
<table border="1">

    <th:block th:value="${employeeByLogin}">
        <label> Results </label>
        <br>
        <label>Id:</label>
        <span th:text="${employeeByLogin.id}"></span>
        <br>
        <label>Login:</label>
        <span th:text="${employeeByLogin.login}"></span>
        <br>
        <label>Roles:</label>
        <th:block th:each="role, counter : ${employeeByLogin.roleDTOS}">
            <span th:text="${role.name}"></span>
            <span th:if="${!counter.last}">, </span>
        </th:block>
        <br>
    </th:block>
    <br>
    <a th:href="@{/getEmployeePage}">Home</a>
    <!--    <a th:href="@{/editProduct(id=${productById.id})}">Edit</a>-->
    <!--    <a th:href="@{/deleteProduct(id=${productById.id})}">Delete</a>-->


</table>
</body>
</html>
