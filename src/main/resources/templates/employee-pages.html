<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee List</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
</head>

<h1>Employee List</h1>

<div th:if="${searchError != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${searchError}">Error</span>
</div>
<div th:if="${missingAttributeError != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${missingAttributeError}">Error</span>
</div>
<div th:if="${validationError != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${validationError}">Error</span>
</div>
<div th:if="${pageError != null}" class="alert alert-danger"
     style="color: white; background-color: #dc3545; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
    <span th:text="${pageError}">Error</span>
</div>

<body>
<table border="1">

    <tr>
        <th>Id</th>
        <th>Login</th>
        <th>Roles</th>
    </tr>


    <tr th:each="employee : ${employeePage.getContent}">
        <td th:utext="${employee.id}">...</td>
        <td th:utext="${employee.login}">...</td>
        <td>
            <th:block th:each="role, counter : ${employee.roleDTOS}">
                <span th:text="${role.name}"></span>
                <span th:if="${!counter.last}">, </span>
            </th:block>
        </td>
        <td>
            <a th:href="@{/deleteEmployee(id=${employee.id})}">Delete </a>
            <br>
            <a th:href="@{/editEmployee(id=${employee.id})}">Edit </a>
        </td>
    </tr>

    <br>
    <br>
    <br>

    <form th:action="@{/findEmployeeById}" th:object="${requestedEmployee}"
          method="get">
        Identifier:
        <input type="number" th:field="*{id}"/>

        <br/>
        <input type="submit" value="Find Employee"/>
    </form>

    <br>
    <br>
    <br>


    <form th:action="@{/findEmployeeByName}"
          method="get" th:object="${requestedEmployee}">
        Name:
        <input type="text" th:field="*{login}"/>
        <br/>
        <input type="submit" value="Find Employee"/>
    </form>

    <br>
    <br>
    <br>


</table>
<br>
<div>
    <span th:if="${employeePage.hasPrevious()}">
        <a th:href="@{/getEmployeePage(page=${employeePage.number - 1},size=${employeePage.size})}">Back</a>
    </span>
    <th:block th:each="counter : ${#numbers.sequence(0,employeePage.totalPages - 1)}">
        <span th:if="${employeePage.number == counter} ">[[${counter} + 1]] </span>
        <span th:unless="${employeePage.number == counter}">
        <a th:href="@{/getEmployeePage(page=${counter},size=${employeePage.size})}">[[${counter} + 1]] </a>
        </span>
    </th:block>
    <span th:if="${employeePage.hasNext()}">
        <a th:href="@{/getEmployeePage(page=${employeePage.number + 1},size = ${employeePage.size})}">Forward</a>
    </span>


</div>
<br>
<a th:href="@{/registerForm}">Add New Employee </a>
<br>
<a th:href="@{/manager}" style="margin-right:15px;">Manager Page</a>


</body>

</html>
